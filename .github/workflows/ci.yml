name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  php-lint:
    name: PHP lint (${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.0'
          - '8.1'
          - '8.2'
          - '8.3'
          - '8.4'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Lint PHP files
        run: php tools/lint-php.php

  unit-tests:
    name: PHPUnit (${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.2'
          - '8.3'
          - '8.4'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPUnit
        run: composer test

  plugin-check:
    name: WordPress Plugin Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build runtime plugin directory
        run: |
          mkdir -p plugin-check-build/mikesoft-teamvault
          rsync -a ./ plugin-check-build/mikesoft-teamvault/ \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.phpunit.cache' \
            --exclude='.wordpress-org' \
            --exclude='AGENTS.md' \
            --exclude='CONTRIBUTING.md' \
            --exclude='README.md' \
            --exclude='SECURITY.md' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='docs' \
            --exclude='plugin-check-build' \
            --exclude='tests' \
            --exclude='tools' \
            --exclude='vendor'

      - name: Run WordPress Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: plugin-check-build/mikesoft-teamvault
          slug: mikesoft-teamvault
          include-experimental: false
